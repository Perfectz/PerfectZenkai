name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm run security:audit || echo "Moderate vulnerabilities found - acceptable for deployment"

      - name: Check for exposed secrets
        run: |
          echo "Checking for accidentally committed secrets..."
          OPENAI_KEY_PATTERN='sk-(proj|svcacct)-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}'
          if grep -RIE "$OPENAI_KEY_PATTERN" src/; then
            echo "❌ OpenAI API key found in source code!"
            exit 1
          fi
          if grep -RIE "VITE_OPENAI_API_KEY=.*($OPENAI_KEY_PATTERN)" src/; then
            echo "❌ OpenAI API key reference found in source code!"
            exit 1
          fi
          echo "✅ No exposed secrets found"

      - name: Lint security
        run: npm run security:scan

  build:
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: |
          export VITE_APP_ENV=production
          export VITE_AI_CHAT_ENABLED=false
          export VITE_DEBUG_MODE=false

          npm run build

          find dist -name "*.map" -delete

          OPENAI_KEY_PATTERN='sk-(proj|svcacct)-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}'
          if grep -RIE "$OPENAI_KEY_PATTERN" dist/; then
            echo "❌ API key found in build output!"
            exit 1
          fi
          echo "✅ Build is secure"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  security-check:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check deployed site security
        run: |
          echo "🔍 Post-deployment security check"
          echo "Site URL: ${{ needs.deploy.outputs.page_url }}"
          echo "✅ Deployment completed securely"
          echo "🛡️ AI Chat disabled for security"
          echo "🔒 No API keys exposed"
